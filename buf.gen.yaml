version: v2
plugins:
  # ----- Go -----
  - remote: buf.build/protocolbuffers/go:v1.35.2
    out: externalgo
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go:v1.5.1
    out: externalgo
    opt:
      - paths=source_relative
  - remote: buf.build/grpc-ecosystem/gateway:v2.24.0
    out: externalgo
    opt:
      - paths=source_relative
      - generate_unbound_methods=true
      - logtostderr=true

  # ----- Docs (protoc-gen-doc, self-hosted gRPC API reference, E-6) -----
  # Renders every external service / method / message — with its proto comments —
  # into one self-contained docs/external.html. gRPC-native (does NOT assume
  # REST); because this module excludes extremo.msg.db.v1 from its dependency
  # closure, no internal types can appear in the published reference.
  - remote: buf.build/community/pseudomuto-doc:v1.5.1
    out: docs
    opt:
      - html,external.html

  # ----- Dart / TypeScript -----
  # TODO(external-proto): re-enable Dart + TS SDK generation once the plugin
  # versions are reconciled with the pinned buf (1.59.0) edition output —
  # protoc-gen-es:v2.3.0 / protocolbuffers/dart:v21.1.2 reject `Edition 9999`
  # from `--include-wkt`. The Go SDK (below) is all the API server needs for the
  # foundation; TS is needed by extremo-view (E-6/E-7) and Ruby/Python by the
  # reference client (E-8), tracked separately.
  # - remote: buf.build/protocolbuffers/dart:v21.1.2
  #   out: lib
  #   opt:
  #     - grpc
  # - remote: buf.build/bufbuild/es:v2.3.0
  #   out: externaltsnode
  #   opt:
  #     - target=ts
  # - remote: buf.build/connectrpc/query-es:v2.0.1
  #   out: externaltsnode
