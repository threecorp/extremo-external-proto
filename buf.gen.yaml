version: v2
plugins:
  # ----- Go -----
  - remote: buf.build/protocolbuffers/go:v1.35.2
    out: externalgo
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go:v1.5.1
    out: externalgo
    opt:
      - paths=source_relative
  - remote: buf.build/grpc-ecosystem/gateway:v2.24.0
    out: externalgo
    opt:
      - paths=source_relative
      - generate_unbound_methods=true
      - logtostderr=true

  # ----- OpenAPI / Swagger (public API docs, E-6) -----
  # Merge every external service into one openapi/external.swagger.json. The
  # external module excludes extremo.msg.db.v1 from its dependency closure, so
  # the published spec is structurally free of internal types (the same
  # anti-corruption boundary the DTOs enforce). The HTTP paths come from the
  # google.api.http annotations already on each RPC.
  - remote: buf.build/grpc-ecosystem/openapiv2:v2.24.0
    out: openapi
    opt:
      - allow_merge=true
      - merge_file_name=external
      - logtostderr=true

  # ----- Dart / TypeScript -----
  # TODO(external-proto): re-enable Dart + TS SDK generation once the plugin
  # versions are reconciled with the pinned buf (1.59.0) edition output —
  # protoc-gen-es:v2.3.0 / protocolbuffers/dart:v21.1.2 reject `Edition 9999`
  # from `--include-wkt`. The Go SDK (below) is all the API server needs for the
  # foundation; TS is needed by extremo-view (E-6/E-7) and Ruby/Python by the
  # reference client (E-8), tracked separately.
  # - remote: buf.build/protocolbuffers/dart:v21.1.2
  #   out: lib
  #   opt:
  #     - grpc
  # - remote: buf.build/bufbuild/es:v2.3.0
  #   out: externaltsnode
  #   opt:
  #     - target=ts
  # - remote: buf.build/connectrpc/query-es:v2.0.1
  #   out: externaltsnode
