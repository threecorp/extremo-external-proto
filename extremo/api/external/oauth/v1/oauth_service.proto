syntax = "proto3";

// Package extremo.api.external.oauth.v1 is the OAuth2 token endpoint of the
// Extremo external partner API. A partner exchanges its client credentials (the
// API key minted by the internal ApiKeyService — see Phase E / E-2) for a
// short-lived, scope-bounded access token, then presents that token as the
// bearer credential on the external read APIs.
//
// Only the OAuth2 `client_credentials` grant (RFC 6749 §4.4) is supported: this
// is a machine-to-machine flow with no end user and no browser redirect, so
// there is deliberately NO `/authorize` endpoint and NO refresh token — when the
// access token expires the client simply re-exchanges its credential.
//
// Both this token path (stateless JWT) and the raw API-key bearer path (E-2)
// resolve to the SAME server-side principal (tenant + scopes), so the two
// authentication methods are interchangeable from a handler's point of view.
package extremo.api.external.oauth.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";

option go_package = "github.com/threecorp/extremo-external-proto/externalgo/extremo/api/external/oauth/v1;oauth";

// OAuthService issues access tokens for the external partner API.
service OAuthService {
  // Token exchanges client credentials for a short-lived access token using the
  // OAuth2 `client_credentials` grant (RFC 6749 §4.4).
  rpc Token(TokenRequest) returns (TokenResponse) {
    option (google.api.http) = {
      post: "/api/external/v1/oauth/token"
      body: "*"
    };
  }
}

// TokenRequest carries the OAuth2 `client_credentials` grant parameters.
message TokenRequest {
  // Grant type; must be "client_credentials" (the only supported grant).
  string grant_type = 1 [(buf.validate.field).string.min_len = 1];
  // Public client identifier (the API key's non-secret display prefix, e.g.
  // "extk_a1b2c3d"), used to identify which credential is presented.
  string client_id = 2 [(buf.validate.field).string.min_len = 1];
  // Client secret (the full API key secret, "extk_..."). Sent only to this
  // endpoint, never on the resource APIs.
  string client_secret = 3 [(buf.validate.field).string.min_len = 1];
  // Optional space-delimited subset of the credential's scopes to request.
  // Empty means "all scopes the credential holds".
  string scope = 4;
}

// TokenResponse is the OAuth2 access-token response (RFC 6749 §5.1).
message TokenResponse {
  // The signed, short-lived bearer access token (a JWT).
  string access_token = 1;
  // Token type; always "Bearer".
  string token_type = 2;
  // Access-token lifetime in seconds.
  int64 expires_in = 3;
  // Space-delimited scopes actually granted (the intersection of the requested
  // scopes and the credential's scopes).
  string scope = 4;
}
